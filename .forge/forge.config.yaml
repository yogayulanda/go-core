forge_version: "0.2.1"
tier: standard

layers_enabled:
  - backend
  - testing

systems:
  - name: go-core
    type: library

loading:
  default_mode: implementation
  respect_size_budget: true

size_budget:
  core_lines: 200
  layer_lines: 150
  system_lines: 200
  mode_lines: 40

governance:
  staleness_days: 90
  require_evidence_for: [confirmed, inferred]
  demote_confirmed_on_evidence_change: true
